<!DOCTYPE html>
<html>
    <head>
        <title>Thoughts App</title>
        <style>
            body{
                font-family: 'Courier New', Courier, monospace;
                max-width: 600px;
                margin: 40px auto;
                padding: 0 10px;
            }
            textarea {
                width: 100%;
                height: 80px;
            }
            button {
                margin-top: 10px;
                padding: 8px 12px;
            }
            .thought {
                border-bottom: 1px solid #ddd;
                padding: 10px 0;
            }
            .time {
                font-size: 12px;
                color: gray;
            }
        </style> 
    </head>
    <body>
        <h2> Thoughts </h2>
        <textarea id="input" placeholder="What are you thinking?"></textarea>
        <br>
        <button onclick="postThought()">Post</button>

        <h3> Feed </h3>
        <div id="list"></div>

        <script>
            async function fetchThoughts() {
                const res = await fetch('/api/thoughts');
                const data = await res.json();

                const list = document.getElementById('list');
                list.innerHTML='';

                data.forEach(t => {
                    const div = document.createElement('div');
                    div.className='thought';
                    div.innerHTML = `
                        <div>${t.text}</div>
                        <div class="time">${new Date(t.time).toLocaleString()}</div>
                    `;
                list.appendChild(div);
                });
            }

                async function postThought() {
                const input = document.getElementById('input');
                const text = input.value.trim();

                if (!text) return;

                await fetch('/api/thoughts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                input.value = '';
                fetchThoughts();
                }

        fetchThoughts();
 
        </script>
    </body>
</html>
